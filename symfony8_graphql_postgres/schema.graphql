type Query {
  node(id: ID!): Node
  user(id: ID!): User
  users(
    "Returns the first n elements from the list."
    first: Int

    "Returns the last n elements from the list."
    last: Int

    "Returns the elements in the list that come before the specified cursor."
    before: String

    "Returns the elements in the list that come after the specified cursor."
    after: String
  ): UserCursorConnection
}

"A node, according to the Relay specification."
interface Node {
  "The id of this node."
  id: ID!
}

type User implements Node {
  id: ID!
  _id: Int!
  firstname: String
  lastname: String
  email: String!
  mobile: String
  username: String!
  password: String!
  roles: Iterable!
  isactivated: Int!
  isblocked: Int!
  secretkey: String
  mailtoken: Int!
  qrcodeurl: String
  userpic: String!
  createdAt: String!
  updatedAt: String!
  totpSecret: String
  token: String!
  userIdentifier: String!
  totpAuthenticationUsername: String!
}

"The `Iterable` scalar type represents an array or a Traversable with any kind of data."
scalar Iterable

"Cursor connection for User."
type UserCursorConnection {
  edges: [UserEdge]
  pageInfo: UserPageInfo!
  totalCount: Int!
}

"Edge of User."
type UserEdge {
  node: User
  cursor: String!
}

"Information about the current page."
type UserPageInfo {
  endCursor: String
  startCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

type Mutation {
  "Creates a User."
  createUser(input: createUserInput!): createUserPayload

  "Logins a User."
  loginUser(input: loginUserInput!): loginUserPayload
}

"Creates a User."
input createUserInput {
  firstname: String!
  lastname: String!
  email: String!
  mobile: String!
  username: String!
  password: String!
  clientMutationId: String
}

"Creates a User."
type createUserPayload {
  user: createUserPayloadData
  clientMutationId: String
}

"Creates a User."
type createUserPayloadData implements Node {
  id: ID!
}

"Logins a User."
input loginUserInput {
  username: String!
  password: String!
  clientMutationId: String
}

"Logins a User."
type loginUserPayload {
  user: loginUserPayloadData
  clientMutationId: String
}

"Logins a User."
type loginUserPayloadData implements Node {
  id: ID!
}

