type Query {
  node(id: ID!): Node
  listdataProducts(page: Int): ProductPageConnection
  searchdataProducts(page: Int, keyword: String): ProductPageConnection
  reportProducts: [Product]
  saledataSales: [Sale]
  user(id: ID!, extraParam: String): User
  users(
    "Returns the first n elements from the list."
    first: Int

    "Returns the last n elements from the list."
    last: Int

    "Returns the elements in the list that come before the specified cursor."
    before: String

    "Returns the elements in the list that come after the specified cursor."
    after: String
  ): UserCursorConnection
}

"A node, according to the Relay specification."
interface Node {
  "The id of this node."
  id: ID!
}

"Page connection for Product."
type ProductPageConnection {
  collection: [Product]
  paginationInfo: ProductPaginationInfo!
}

type Product implements Node {
  id: ID!
  _id: Int!
  category: String
  descriptions: String!
  qty: Int!
  unit: String
  costprice: String!
  sellprice: String!
  saleprice: String!
  productpicture: String
  alertstocks: Int!
  criticalstocks: Int!
  createdAt: String!
  updatedAt: String
  page: Int!
  totalpage: Int!
  totalrecords: Int!
}

"Information about the pagination."
type ProductPaginationInfo {
  itemsPerPage: Int!
  lastPage: Int!
  totalCount: Int!
  currentPage: Int!
  hasNextPage: Boolean!
}

type Sale implements Node {
  id: ID!
  _id: Int!
  saleamount: String!
  saledate: String
  saleAmount: String!
  saleDate: String!
}

type User implements Node {
  id: ID!
  _id: Int!
  firstname: String
  lastname: String
  email: String!
  mobile: String
  username: String!
  password: String!
  roles: Iterable!
  isactivated: Int!
  isblocked: Int!
  secretkey: String
  mailtoken: Int!
  qrcodeurl: String
  userpic: String!
  createdAt: String!
  updatedAt: String!
  totpSecret: String
  token: String!
  message: String!
  userIdentifier: String!
  totpAuthenticationUsername: String!
}

"The `Iterable` scalar type represents an array or a Traversable with any kind of data."
scalar Iterable

"Cursor connection for User."
type UserCursorConnection {
  edges: [UserEdge]
  pageInfo: UserPageInfo!
  totalCount: Int!
}

"Edge of User."
type UserEdge {
  node: User
  cursor: String!
}

"Information about the current page."
type UserPageInfo {
  endCursor: String
  startCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

type Mutation {
  "Creates a User."
  createUser(input: createUserInput!): createUserPayload

  "Logins a User."
  loginUser(input: loginUserInput!): loginUserPayload

  "UpdateProfiles a User."
  updateProfileUser(input: updateProfileUserInput!): updateProfileUserPayload

  "UpdatePasswords a User."
  updatePasswordUser(input: updatePasswordUserInput!): updatePasswordUserPayload

  "ActivateMfas a User."
  activateMfaUser(input: activateMfaUserInput!): activateMfaUserPayload

  "VerifyOtps a User."
  verifyOtpUser(input: verifyOtpUserInput!): verifyOtpUserPayload

  "UploadPictures a User."
  uploadPictureUser(input: uploadPictureUserInput!): uploadPictureUserPayload
}

"Creates a User."
input createUserInput {
  firstname: String!
  lastname: String!
  email: String!
  mobile: String!
  username: String!
  password: String!
  clientMutationId: String
}

"Creates a User."
type createUserPayload {
  user: User
  clientMutationId: String
}

"Logins a User."
input loginUserInput {
  username: String!
  password: String!
  clientMutationId: String
}

"Logins a User."
type loginUserPayload {
  user: User
  clientMutationId: String
}

"UpdateProfiles a User."
input updateProfileUserInput {
  id: ID!
  extraParam: String
  firstname: String!
  lastname: String!
  mobile: String!
  clientMutationId: String
}

"UpdateProfiles a User."
type updateProfileUserPayload {
  user: User
  clientMutationId: String
}

"UpdatePasswords a User."
input updatePasswordUserInput {
  id: ID!
  extraParam: String
  password: String!
  clientMutationId: String
}

"UpdatePasswords a User."
type updatePasswordUserPayload {
  user: User
  clientMutationId: String
}

"ActivateMfas a User."
input activateMfaUserInput {
  id: ID!
  extraParam: String
  twofactorenabled: Boolean!
  clientMutationId: String
}

"ActivateMfas a User."
type activateMfaUserPayload {
  user: User
  clientMutationId: String
}

"VerifyOtps a User."
input verifyOtpUserInput {
  id: ID!
  extraParam: String
  otp: String!
  clientMutationId: String
}

"VerifyOtps a User."
type verifyOtpUserPayload {
  user: User
  clientMutationId: String
}

"UploadPictures a User."
input uploadPictureUserInput {
  id: ID!
  extraParam: String
  file: Upload
  clientMutationId: String
}

"The `Upload` type represents a file to be uploaded in the same HTTP request as specified by [graphql-multipart-request-spec](https://github.com/jaydenseric/graphql-multipart-request-spec)."
scalar Upload

"UploadPictures a User."
type uploadPictureUserPayload {
  user: User
  clientMutationId: String
}

